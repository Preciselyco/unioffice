linters:
  enable-all: false
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused

issues:
  exclude-rules:
    # cmd/ uses kong's non-standard struct tag syntax
    - path: cmd/
      linters: [govet]
      text: "structtag"

    # schema/ is generated code — don't lint it
    - path: schema/
      linters:
        - govet
        - staticcheck
        - errcheck
        - gosimple
        - ineffassign
        - unused
